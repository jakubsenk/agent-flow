# NOTE: No Gitea Actions runner is configured for this repo.
# All jobs will be cancelled at 0s. Tests run locally via ./tests/harness/run-tests.sh
# This workflow is kept for future use if a runner is registered.

name: Test agent-flow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test harness
        run: bash tests/harness/run-tests.sh
