name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  harness:
    name: Harness suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run harness
        id: harness
        run: bash tests/harness/run-tests.sh
        shell: bash
        env:
          HARNESS_JOBS: 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-logs
          path: |
            tests/.harness-output/
            .agent-flow/pipeline.log
          if-no-files-found: ignore
          retention-days: 14
